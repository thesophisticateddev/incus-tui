name: Release

on:
  push:
    tags:
      - "v*"  # e.g. v0.1.0, v1.2.3

env:
  PYTHON_VERSION: "3.12"
  INCUS_TUI_VERSION: ${{ github.ref_name }}

jobs:
  # ------------------------------------------------------------------
  # Test suite — pre-release gate.
  # ------------------------------------------------------------------
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest tests/ -q

  # ------------------------------------------------------------------
  # Build sdist + wheel for PyPI (Phase 1).
  # Runs in parallel with create-release. Does NOT need the release to exist.
  # ------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: pypi
      url: https://pypi.org/project/incus-tui/
    permissions:
      id-token: write  # Required for OIDC trusted publishing.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI via OIDC Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1

  # ------------------------------------------------------------------
  # Create GitHub Release (after tests pass).
  # ------------------------------------------------------------------
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: test
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v4
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "incus-tui ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## incus-tui ${{ github.ref_name }}

            Download the binary for your platform, extract it, and run `incus-tui`.

            **Linux (x86_64):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/incus-tui-${{ github.ref_name }}-linux-x86_64.tar.gz
            tar -xzf incus-tui-${{ github.ref_name }}-linux-x86_64.tar.gz
            ./incus-tui-${{ github.ref_name }}-linux-x86_64/incus-tui
            ```

            **macOS (ARM64 / Apple Silicon):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/incus-tui-${{ github.ref_name }}-macos-arm64.tar.gz
            tar -xzf incus-tui-${{ github.ref_name }}-macos-arm64.tar.gz
            ./incus-tui-${{ github.ref_name }}-macos-arm64/incus-tui
            # If blocked by Gatekeeper: right-click → Open, then allow in System Preferences.
            ```

            **macOS (x86_64 / Intel):**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/incus-tui-${{ github.ref_name }}-macos-x86_64.tar.gz
            tar -xzf incus-tui-${{ github.ref_name }}-macos-x86_64.tar.gz
            ./incus-tui-${{ github.ref_name }}-macos-x86_64/incus-tui
            # If blocked by Gatekeeper: right-click → Open, then allow in System Preferences.
            ```

            **Windows (x86_64):**
            Download and extract the ZIP, then run `incus-tui.exe` from the extracted folder.

            **Host software required:**
            - `incus` CLI on PATH (all OSes)
            - `ssh` + `sshfs` (Linux/macOS only; for container shell and file mount)

            Check the [CHANGELOG](./CHANGELOG.md) for what changed in this release.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set upload URL output
        run: echo "upload_url=${{ steps.create_release.outputs.upload_url }}" >> $GITHUB_OUTPUT

  # ------------------------------------------------------------------
  # Binary builds — one per target OS/arch.
  # ------------------------------------------------------------------
  build-linux:
    name: Binary (Linux x86_64)
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build (onedir)
        run: |
          pyinstaller --onedir --name incus-tui \
            --hidden-import=encodings \
            --hidden-import=encodings.ascii \
            --hidden-import=encodings.utf_8 \
            --hidden-import=pyte \
            --hidden-import=pyte.modes \
            --hidden-import=pyte.screens \
            --hidden-import=pyte.streams \
            --hidden-import=incus_tui \
            --hidden-import=incus_tui.__about__ \
            --hidden-import=incus_tui.__main__ \
            --hidden-import=incus_tui.app \
            --hidden-import=incus_tui.components \
            --hidden-import=incus_tui.components.access \
            --hidden-import=incus_tui.components.containers \
            --hidden-import=incus_tui.components.create \
            --hidden-import=incus_tui.components.explorer \
            --hidden-import=incus_tui.components.incus \
            --hidden-import=incus_tui.components.terminal \
            --hidden-import=incus_tui.components.welcome \
            --collect-all=textual \
            --collect-data=pyfiglet \
            incus_tui/__main__.py

      - name: Package as tarball
        run: |
          cd dist
          FULLNAME=incus-tui-${{ env.INCUS_TUI_VERSION }}-linux-x86_64
          mv incus-tui "$FULLNAME"
          tar -czf "$FULLNAME.tar.gz" "$FULLNAME"
          sha256sum "$FULLNAME.tar.gz" > "$FULLNAME.tar.gz.sha256"

      - name: Smoke-test version flag
        run: |
          chmod +x dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-linux-x86_64/incus-tui
          ./dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-linux-x86_64/incus-tui --version

      - name: Upload tarball
        uses: actions/upload-release-asset@v4
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset-path: dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-linux-x86_64.tar.gz
          asset-name: incus-tui-${{ env.INCUS_TUI_VERSION }}-linux-x86_64.tar.gz
          asset-content-type: application/gzip

      - name: Upload checksum
        uses: actions/upload-release-asset@v4
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset-path: dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-linux-x86_64.tar.gz.sha256
          asset-name: incus-tui-${{ env.INCUS_TUI_VERSION }}-linux-x86_64.tar.gz.sha256
          asset-content-type: text/plain

  build-macos-arm64:
    name: Binary (macOS ARM64)
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build (onedir)
        run: |
          pyinstaller --onedir --name incus-tui \
            --hidden-import=encodings \
            --hidden-import=encodings.ascii \
            --hidden-import=encodings.utf_8 \
            --hidden-import=pyte \
            --hidden-import=pyte.modes \
            --hidden-import=pyte.screens \
            --hidden-import=pyte.streams \
            --hidden-import=incus_tui \
            --hidden-import=incus_tui.__about__ \
            --hidden-import=incus_tui.__main__ \
            --hidden-import=incus_tui.app \
            --hidden-import=incus_tui.components \
            --hidden-import=incus_tui.components.access \
            --hidden-import=incus_tui.components.containers \
            --hidden-import=incus_tui.components.create \
            --hidden-import=incus_tui.components.explorer \
            --hidden-import=incus_tui.components.incus \
            --hidden-import=incus_tui.components.terminal \
            --hidden-import=incus_tui.components.welcome \
            --collect-all=textual \
            --collect-data=pyfiglet \
            incus_tui/__main__.py

      - name: Package as tarball
        run: |
          cd dist
          FULLNAME=incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-arm64
          mv incus-tui "$FULLNAME"
          tar -czf "$FULLNAME.tar.gz" "$FULLNAME"
          sha256sum "$FULLNAME.tar.gz" > "$FULLNAME.tar.gz.sha256"

      - name: Smoke-test version flag
        run: |
          chmod +x dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-arm64/incus-tui
          ./dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-arm64/incus-tui --version

      - name: Upload tarball
        uses: actions/upload-release-asset@v4
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset-path: dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-arm64.tar.gz
          asset-name: incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-arm64.tar.gz
          asset-content-type: application/gzip

      - name: Upload checksum
        uses: actions/upload-release-asset@v4
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset-path: dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-arm64.tar.gz.sha256
          asset-name: incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-arm64.tar.gz.sha256
          asset-content-type: text/plain

  build-macos-intel:
    name: Binary (macOS x86_64)
    runs-on: macos-13
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build (onedir)
        run: |
          pyinstaller --onedir --name incus-tui \
            --hidden-import=encodings \
            --hidden-import=encodings.ascii \
            --hidden-import=encodings.utf_8 \
            --hidden-import=pyte \
            --hidden-import=pyte.modes \
            --hidden-import=pyte.screens \
            --hidden-import=pyte.streams \
            --hidden-import=incus_tui \
            --hidden-import=incus_tui.__about__ \
            --hidden-import=incus_tui.__main__ \
            --hidden-import=incus_tui.app \
            --hidden-import=incus_tui.components \
            --hidden-import=incus_tui.components.access \
            --hidden-import=incus_tui.components.containers \
            --hidden-import=incus_tui.components.create \
            --hidden-import=incus_tui.components.explorer \
            --hidden-import=incus_tui.components.incus \
            --hidden-import=incus_tui.components.terminal \
            --hidden-import=incus_tui.components.welcome \
            --collect-all=textual \
            --collect-data=pyfiglet \
            incus_tui/__main__.py

      - name: Package as tarball
        run: |
          cd dist
          FULLNAME=incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-x86_64
          mv incus-tui "$FULLNAME"
          tar -czf "$FULLNAME.tar.gz" "$FULLNAME"
          sha256sum "$FULLNAME.tar.gz" > "$FULLNAME.tar.gz.sha256"

      - name: Smoke-test version flag
        run: |
          chmod +x dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-x86_64/incus-tui
          ./dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-x86_64/incus-tui --version

      - name: Upload tarball
        uses: actions/upload-release-asset@v4
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset-path: dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-x86_64.tar.gz
          asset-name: incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-x86_64.tar.gz
          asset-content-type: application/gzip

      - name: Upload checksum
        uses: actions/upload-release-asset@v4
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset-path: dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-x86_64.tar.gz.sha256
          asset-name: incus-tui-${{ env.INCUS_TUI_VERSION }}-macos-x86_64.tar.gz.sha256
          asset-content-type: text/plain

  build-windows:
    name: Binary (Windows x86_64)
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build (onedir)
        shell: pwsh
        run: |
          pyinstaller --onedir --name incus-tui `
            --hidden-import=encodings `
            --hidden-import=encodings.ascii `
            --hidden-import=encodings.utf_8 `
            --hidden-import=pyte `
            --hidden-import=pyte.modes `
            --hidden-import=pyte.screens `
            --hidden-import=pyte.streams `
            --hidden-import=incus_tui `
            --hidden-import=incus_tui.__about__ `
            --hidden-import=incus_tui.__main__ `
            --hidden-import=incus_tui.app `
            --hidden-import=incus_tui.components `
            --hidden-import=incus_tui.components.access `
            --hidden-import=incus_tui.components.containers `
            --hidden-import=incus_tui.components.create `
            --hidden-import=incus_tui.components.explorer `
            --hidden-import=incus_tui.components.incus `
            --hidden-import=incus_tui.components.terminal `
            --hidden-import=incus_tui.components.welcome `
            --collect-all=textual `
            --collect-data=pyfiglet `
            incus_tui/__main__.py

      - name: Package as zip
        shell: pwsh
        run: |
          $ver = "${{ env.INCUS_TUI_VERSION }}"
          $fname = "incus-tui-$ver-windows-x86_64"
          Move-Item -Path dist\incus-tui -Destination "dist\$fname"
          Compress-Archive -Path "dist\$fname" -DestinationPath "dist\$fname.zip" -Force
          $hash = (Get-FileHash -Path "dist\$fname.zip" -Algorithm SHA256 | Select-Object -ExpandProperty Hash).ToLower()
          "$hash" | Out-File -FilePath "dist\$fname.zip.sha256" -Encoding ASCII

      - name: Smoke-test version flag
        shell: pwsh
        run: |
          .\dist\incus-tui-${{ env.INCUS_TUI_VERSION }}-windows-x86_64\incus-tui.exe --version

      - name: Upload zip
        uses: actions/upload-release-asset@v4
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset-path: dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-windows-x86_64.zip
          asset-name: incus-tui-${{ env.INCUS_TUI_VERSION }}-windows-x86_64.zip
          asset-content-type: application/zip

      - name: Upload checksum
        uses: actions/upload-release-asset@v4
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset-path: dist/incus-tui-${{ env.INCUS_TUI_VERSION }}-windows-x86_64.zip.sha256
          asset-name: incus-tui-${{ env.INCUS_TUI_VERSION }}-windows-x86_64.zip.sha256
          asset-content-type: text/plain
